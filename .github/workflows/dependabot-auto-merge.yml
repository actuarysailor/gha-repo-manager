name: Auto Merge Dependabot

on:
  # Fires on every individual check completion. The job does a single
  # non-blocking snapshot: if any checks are still pending it exits
  # immediately (no runner held). When the last check finishes the
  # snapshot shows all passed and the merge proceeds.
  check_run:
    types: [completed]

# One run at a time per PR. When multiple checks complete in quick succession,
# cancel-in-progress: true drops redundant queued runs — the last one proceeds.
# Falls back to head_sha for check_runs not associated with a PR.
concurrency:
  group: dependabot-auto-merge-${{ github.event.check_run.pull_requests[0].number || github.event.check_run.head_sha }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # Gate on the completed check_run belonging to a dependabot PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      checks: read
      contents: write
      pull-requests: write
    steps:
      - name: Find open dependabot PR for this commit
        id: pr
        run: |
          SHA="${{ github.event.check_run.head_sha }}"
          PR=$(gh pr list \
            --repo "${{ github.repository }}" \
            --author "dependabot[bot]" \
            --state open \
            --json number,headRefOid \
            --jq ".[] | select(.headRefOid == \"$SHA\") | .number" \
            | head -1)
          echo "number=${PR:-}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Snapshot all checks — exit fast if any still pending
        id: checks
        if: steps.pr.outputs.number != ''
        run: |
          PENDING=$(gh pr checks "${{ steps.pr.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --json name,state \
            --jq '[.[] | select(.state | test("QUEUED|IN_PROGRESS|WAITING|PENDING"; "i"))] | length')

          FAILED=$(gh pr checks "${{ steps.pr.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --json name,state \
            --jq '[.[] | select(.state | test("FAILURE|ERROR|CANCELLED|TIMED_OUT|ACTION_REQUIRED|STARTUP_FAILURE"; "i"))] | length')

          echo "pending=${PENDING}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}"   >> "$GITHUB_OUTPUT"

          if [[ "$PENDING" -gt 0 ]]; then
            echo "Checks still running ($PENDING pending) — nothing to do yet."
            exit 0
          fi

          if [[ "$FAILED" -gt 0 ]]; then
            echo "One or more checks failed ($FAILED failed) — skipping auto-merge."
            exit 1
          fi

          echo "All checks passed."
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/checkout@v6.0.2
        if: >
          steps.pr.outputs.number != '' &&
          steps.checks.outputs.pending == '0' &&
          steps.checks.outputs.failed == '0'

      - uses: ahmadnassri/action-dependabot-auto-merge@v2.6.6
        if: >
          steps.pr.outputs.number != '' &&
          steps.checks.outputs.pending == '0' &&
          steps.checks.outputs.failed == '0'
        with:
          target: minor
          command: squash and merge
          github-token: ${{ github.token }} #${{ secrets.THIS_PAT }}
